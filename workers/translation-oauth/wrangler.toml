name               = "spoolease-translation"
main               = "src/index.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Required secret (already set via `wrangler secret put BOT_TOKEN`):
# BOT_TOKEN — GitHub Personal Access Token (classic) with `repo` scope
#             on mybesttools/SpoolEase, used by the worker to create
#             branches, commit files, and open Pull Requests.
# OAUTH_CLIENT_SECRET — GitHub OAuth App client secret used server-side
#                       for /device/token exchange.
#
# After deploying, paste the *.workers.dev URL into
# docs/translations-upload.html as the OAUTH_WORKER_URL constant.
