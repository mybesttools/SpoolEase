[package]
name = "SpoolEase"
homepage = "SpoolEase.io"
version = "0.5.5-b.4"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.84"

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
opt-level = 's'
lto = 'fat'
overflow-checks = false

[profile.release.package.esp-wifi]
opt-level = 3

[profile.dev]
lto = false

[profile.dev.package.esp-wifi]
opt-level = 3

[patch.crates-io]
edge-nal-embassy = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-dhcp = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-nal = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-captive = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-http = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-mdns = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}
edge-ws = { git = "https://github.com/yanshay/edge-net", branch = "yanshay_update-to-embassy-time-0.5.0"}

[build-dependencies]
slint-build = "=1.11.0"
walkdir = "2.5.0"

[dependencies]
#TODO: Important - lock to specific tag when released
framework = { package = "esp-hal-app-framework", git = "https://github.com/yanshay/esp-hal-app/", tag = "0.6.1", features = ["esp32s3", "improv-jtag-serial", "wt32-sc01-plus"] }
framework_macros = { package = "esp-hal-app-framework-macros", git = "https://github.com/yanshay/esp-hal-app/", tag = "0.6.1" }
# framework = { package = "esp-hal-app-framework", path = "../../../esp-hal-app/esp-hal-app-framework/", features = ["esp32s3", "improv-jtag-serial", "wt32-sc01-plus"] }
# framework_macros = { package = "esp-hal-app-framework-macros", path = "../../../esp-hal-app/esp-hal-app-framework-macros/" }
esp32s3 = { version = "0.34.0" }

# Esp-Hal Crates
xtensa-lx-rt = { version = "0.21.0", features = ["float-save-restore"] }
esp-hal = { version = "1.0.0", features = ["unstable", "psram", "log-04"] }
esp-backtrace = { version = "0.18.0", features = [ "panic-handler", "println"] }
esp-println = { version = "0.16.0", default-features = false, features = ["critical-section", "colors", "auto", "log-04"] }
esp-rtos = { version = "0.2.0", features = ["embassy", "esp-alloc", "esp-radio", "alloc"] }
esp-radio = { version = "0.17.0", features = ["wifi", "esp-alloc"]}
esp-partition-table = { version = "0.1.3" }
esp-bootloader-esp-idf = { version = "0.4.0" }

esp-mbedtls = { git = "https://github.com/yanshay/esp-mbedtls.git", features = [ "async" ], branch="yanshay_esp-hal-1.0.0-with-session-reuse" }
# esp-mbedtls = { path = "../../../../../../OpenSourceProj/forked/esp-mbedtls/esp-mbedtls/", features = [ "async" ] }
# esp-mbedtls = { git = "https://github.com/esp-rs/esp-mbedtls.git", features = [ "async" ], rev = "5eaa316b5d9a364534cbb6dd353a883e1e9c4716" } # https://github.com/esp-rs/esp-mbedtls/pull/96/commits
esp-alloc = { version = "0.9.0" } # features = ["internal-heap-stats"] }
esp-storage = { version = "0.4.0", features = [ "nor-flash", "esp32s3" ] }

esp-hal-ota = { version = "0.4.5" }

# Embedded crates
embedded-hal = { version = "1.0.0" }
embedded-hal-async = { version = "1.0.0" }
embedded-hal-bus = { version = "0.3.0", features = ["async"] }
embedded-storage = { version = "0.3.1" }
embedded-storage-async = { version = "0.4.1" }
embedded-io = "0.6.1"
embedded-io-async = { version = "0.6.1" }

# Embassy & Async crates
embassy-embedded-hal = { version = "0.5.0" }
embassy-time = { version = "0.5.0", features = ["generic-queue-8"] }
embassy-executor = { version = "0.9.0", features = ["nightly"] }
embassy-net = { version = "0.7.1", features = ["raw", "tcp", "udp", "dhcpv4", "medium-ethernet", "multicast" ] }
embassy-futures = { version = "0.1.2" }
embassy-sync = { version = "0.7.2" }
futures = { version = "0.3.31", features = ["alloc"], default-features = false }
futures-util = { version = "0.3.31", default-features = false }

# Storage crates
sequential-storage = { git = "https://github.com/tweedegolf/sequential-storage", features = [ "alloc", ], rev = "b6f7da77b7f3d66bc1ac36992a6a7b399b5ba030" }

# Display & Touch crates
mipidsi = { version = "0.8.0" } # # can't upgrade due to mismatch with display-interface-parallel-gpio 0.7.0
slint = { version = "=1.11.0", default-features = false, features = [ "libm", "unsafe-single-threaded", "compat-1-2", "renderer-software" ] }

# Networking crates
smoltcp = { version = "0.12.0", default-features = false, features = [ "proto-ipv4", "socket-tcp", "socket-icmp", "socket-udp", "medium-ethernet", "proto-dhcpv4", "socket-raw", "socket-dhcpv4"] }

# edge-nal-embassy = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-nal-embassy/" }
# edge-http = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-http/" }
# edge-dhcp = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-dhcp/" }
# edge-nal = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-nal/" }
# edge-captive = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-captive/" }
# edge-ws = { path = "../../../../../OpenSourceProj/forked/edge-net/edge-ws/" }

edge-nal-embassy = "0.7.0"
edge-http = { version = "0.6.1" }
edge-dhcp = { version = "0.6.0" }
edge-nal = { version = "0.5.0" }
edge-captive = { version = "0.6.0" }
edge-ws = { version = "0.5.0" } 

# picoserve = {version = "0.14.1", git = "https://github.com/sammhicks/picoserve", rev = "5d40ea410efa4c2e313cfaa19f62f844ece1fd55", features = ["alloc", "embassy"] }
picoserve = {version = "0.15.1", features = ["alloc", "embassy"] }


# Utility crates
cfg-if = "1.0.0"
no_std_io = { version = "0.6.0", default-features = false, features = [ "alloc" ] }
log = { version = "0.4.22", features = ["serde"] }
# heapless = "0.8.0"
critical-section = "1.2.0"
static_cell = { version = "2.1", features = ["nightly"] }
once_cell = { version = "1.20.2", default-features = false, features = ["alloc"] }
anyhow = { version = "1.0.91", default-features = false }
snafu = { git = "https://github.com/shepmaster/snafu", rev = "aedc9db8c04a437b4c547efd4d73e9337fa43a4a", default-features = false, features = ["rust_1_81", "alloc"]} # , "backtraces-impl-backtrace-crate"]} 
hashbrown = { version = "0.16.1", features = ["serde"] }
serde = { version = "1.0.213", default-features = false, features = [ "derive", "alloc", ] }
serde_json = { version = "1.0.132", default-features = false, features = [ "alloc", ] }
serde-csv-core = "0.3.2"
serde_with = { version = "3.16.0", default-features = false, features = ["alloc", "macros", "base64", "hashbrown_0_16", "hex"]}
pasetors = { version = "0.7.0", default-features = false, features = ["v4"] }
base64 = { version = "0.22.1", default-features = false, features = ["alloc"] }
getrandom = { version = "0.2.15", features = ["custom"] }
semver = { version = "1.0.25", default-features = false }
derivative = { version = "2.2.0", features = ["use_core"] }
siphasher = { version = "1.0.1", default-features = false }
num-traits = { version = "0.2.19", default-features = false }
fnv = { version = "1.0.7", default-features = false }
hex = {version = "0.4.3", default-features = false, features = ["alloc"]}
embedded-sdmmc = { git = "https://github.com/yanshay/embedded-sdmmc-rs", branch = "yanshay_bisync" }
# url = { version ="2.5.7", default-features = false }
percent-encoding = {version = "2.3.2", default-features = false, features = ["alloc"]}

# Security/Crypto crates
aes-gcm = { version = "0.10" }  # AES-GCM encryption/decryption
# getrandom = { version = "0.3.0", default-features = false }
rand = { version = "0.8", default-features = false }
aes="0.8.4"
ctr = "0.9.2"
pbkdf2 = { version = "0.12", features = ["simple"] }
sha2 = { version = "0.10.8", default-features = false}
hmac = { version = "0.12.1", default-features = false}

# Application specific crates
mqttrust = { version = "0.6.0" }
pn532 = { git = "https://github.com/yanshay/pn532", branch ="yanshay_esp-hal-1.0.0-upgrade", default-features = false }
#pn532 = { git = "https://github.com/yanshay/pn532", branch ="yanshay_async_full", default-features = false }
# pn532 = { path="../../../../../OpenSourceProj/forked/pn532/", default-features = false }
regex = { version = "1.11.1", default-features = false }
shared = { path = "../shared/" }
# ndef-rs = { path = "../../../../../../OpenSourceProj/forked/ndef-rs/ndef", default-features = false}
ndef-rs = { git = "https://github.com/yanshay/ndef-rs" , branch = "yanshay_no_std", default-features = false}
minicbor = { version = "2.1.3", default-features =false, features = ["alloc", "derive", "half"]}
minicbor-derive = {version = "0.18.3" }

[features]
default = ["esp32s3"]

esp32s3 = [
  "esp-hal/esp32s3",
  "esp-backtrace/esp32s3",
  "esp-println/esp32s3",
  "esp-radio/esp32s3",
  "esp-mbedtls/esp32s3",
  "esp-rtos/esp32s3",
  "esp-storage/esp32s3",
  "esp-hal-ota/esp32s3",
  "esp-bootloader-esp-idf/esp32s3",
]

esp32 = [
  "esp-hal/esp32",
  "esp-backtrace/esp32",
  "esp-println/esp32",
  "esp-radio/esp32",
  "esp-mbedtls/esp32",
]
esp32c3 = [
  "esp-hal/esp32c3",
  "esp-backtrace/esp32c3",
  "esp-println/esp32c3",
  "esp-radio/esp32c3",
  "esp-mbedtls/esp32c3",
]
esp32s2 = [
  "esp-hal/esp32s2",
  "esp-backtrace/esp32s2",
  "esp-println/esp32s2",
  "esp-radio/esp32s2",
  "esp-mbedtls/esp32s2",
]
